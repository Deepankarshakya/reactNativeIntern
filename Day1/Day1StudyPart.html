<script>
    // Compound Assignment with Augemented Addition
    var alp = 3;
    var beta = 27;
    var ceta = 12;

    // Only modify code below
    alp = alp + 12;
    beta = 9 + beta;
    ceta = ceta + 11;

    // More Simple Method
    alp += 12;
    beta += 9;
    ceta += 7;

    // Compounding Assignment with Augmented Subtraction
    // More Simple Method
    alp -= 12;
    beta -= 9;
    ceta -= 7;

    // Compounding Assignment with Augmented Multipation
    alp *= 12;
    beta *= 9;
    ceta *= 7;

    // Compounding Assignment with Augemented Multipation
    alp /= 12;
    beta /= 2.2;
    ceta /= 9.8;
</script>
